<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a2e1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#137333;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a4a2a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c41e3a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#137333;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Fondo -->
  <rect width="1200" height="630" fill="url(#bgGrad)" rx="0"/>

  <!-- Patrón de cuadrícula pixel art sutil -->
  <g opacity="0.05">
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="none" stroke="#ffffff" stroke-width="0.5"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#grid)"/>
  </g>

  <!-- Franja decorativa Rastafari (inferior) -->
  <rect x="0" y="580" width="1200" height="50" fill="url(#accentGrad)" opacity="0.8"/>

  <!-- Círculo decorativo grande (fondo) -->
  <circle cx="600" cy="315" r="280" fill="none" stroke="#d4af37" stroke-width="2" opacity="0.1"/>
  <circle cx="600" cy="315" r="220" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.08"/>

  <!-- Icono 🍅 grande -->
  <text x="600" y="220" text-anchor="middle" font-size="120" font-family="Arial">🍅</text>

  <!-- Título -->
  <text x="600" y="310" text-anchor="middle" font-family="'Courier New', monospace" font-size="64" font-weight="bold" fill="#d4af37" letter-spacing="4">
    PORRODORO
  </text>

  <!-- Subtítulo -->
  <text x="600" y="370" text-anchor="middle" font-family="'Courier New', monospace" font-size="28" fill="#a8d5a2" letter-spacing="2">
    Temporizador Pomodoro
  </text>

  <!-- Línea decorativa -->
  <line x1="350" y1="400" x2="850" y2="400" stroke="#d4af37" stroke-width="2" opacity="0.5"/>

  <!-- Tags -->
  <text x="600" y="440" text-anchor="middle" font-family="'Courier New', monospace" font-size="20" fill="#e8c87a" letter-spacing="1">
    🎵 Ganja Reggae · 🎨 Pixel Weed · ⏱️ Enfoque
  </text>

  <!-- URL -->
  <text x="600" y="510" text-anchor="middle" font-family="'Courier New', monospace" font-size="18" fill="#6aaa5a" letter-spacing="1">
    khalilflores.github.io/porrodoro
  </text>

  <!-- Pequeños iconos decorativos pixel art -->
  <g font-size="24" opacity="0.6">
    <text x="100" y="560">🎵</text>
    <text x="160" y="560">🌿</text>
    <text x="220" y="560">⏰</text>
    <text x="980" y="560">🌿</text>
    <text x="1040" y="560">🎵</text>
    <text x="1100" y="560">🍅</text>
  </g>
</svg>